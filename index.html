<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>Word Counter</h1>

    <label for="textInput">Enter your text:</label><br><br>
    <textarea id="textInput" rows="10" cols="60" placeholder="Type your text here..."></textarea>

    <h2>Results</h2>
    <p id="Letters">Letters: 0</p>
    <p id="Words">Words: 0</p>
    <p id="Sentences">Sentences: 0</p>

    <button id="randomBackground">Random Background</button>

</body>
<script src="/script.js"></script>
</html>
